<svg width="600" viewBox="0 0 600 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="600" height="720" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="300" y="34" text-anchor="middle" font-size="17" font-weight="600" fill="#1a237e">Attendance Marking — Flowchart</text>

  <!-- START -->
  <rect x="175" y="52" width="250" height="42" rx="21" fill="#cfd8dc" stroke="#546e7a" stroke-width="1.2"/>
  <text x="300" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#263238" dominant-baseline="central">Start: student arrives</text>

  <line x1="300" y1="94" x2="300" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 1 -->
  <rect x="165" y="120" width="270" height="58" rx="10" fill="#b2ebf2" stroke="#00838f" stroke-width="1.2"/>
  <text x="300" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#004d40" dominant-baseline="central">Webcam captures frame</text>
  <text x="300" y="162" text-anchor="middle" font-size="11" fill="#00695c">Continuous live feed</text>

  <line x1="300" y1="178" x2="300" y2="202" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 2 -->
  <rect x="165" y="204" width="270" height="58" rx="10" fill="#b2ebf2" stroke="#00838f" stroke-width="1.2"/>
  <text x="300" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#004d40" dominant-baseline="central">Haar cascade detects face</text>
  <text x="300" y="246" text-anchor="middle" font-size="11" fill="#00695c">Returns bounding box (x,y,w,h)</text>

  <line x1="300" y1="262" x2="300" y2="286" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DECISION 1 -->
  <rect x="150" y="288" width="300" height="58" rx="10" fill="#fff9c4" stroke="#f9a825" stroke-width="1.2"/>
  <text x="300" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100" dominant-baseline="central">Face detected?</text>
  <text x="300" y="330" text-anchor="middle" font-size="11" fill="#bf360c">Check bounding box count</text>

  <!-- NO -->
  <line x1="150" y1="317" x2="90" y2="317" stroke="#999" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="118" y="308" text-anchor="middle" font-size="11" fill="#666">No</text>
  <rect x="20" y="294" width="68" height="46" rx="8" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
  <text x="54" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#424242" dominant-baseline="central">Retry</text>
  <text x="54" y="330" text-anchor="middle" font-size="11" fill="#616161">next frame</text>

  <!-- YES -->
  <line x1="300" y1="346" x2="300" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="313" y="360" font-size="11" fill="#388e3c">Yes</text>

  <!-- STEP 3 -->
  <rect x="155" y="372" width="290" height="58" rx="10" fill="#d1c4e9" stroke="#5e35b1" stroke-width="1.2"/>
  <text x="300" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#311b92" dominant-baseline="central">LBPH recognition</text>
  <text x="300" y="414" text-anchor="middle" font-size="11" fill="#4527a0">Predict label + confidence score</text>

  <line x1="300" y1="430" x2="300" y2="454" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DECISION 2 -->
  <rect x="150" y="456" width="300" height="58" rx="10" fill="#fff9c4" stroke="#f9a825" stroke-width="1.2"/>
  <text x="300" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100" dominant-baseline="central">Confidence &lt; threshold?</text>
  <text x="300" y="498" text-anchor="middle" font-size="11" fill="#bf360c">LBPH threshold &lt; 70</text>

  <!-- NO (unknown) -->
  <line x1="450" y1="485" x2="510" y2="485" stroke="#999" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="478" y="476" text-anchor="middle" font-size="11" fill="#666">No</text>
  <rect x="512" y="460" width="70" height="50" rx="8" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="547" y="479" text-anchor="middle" font-size="12" font-weight="600" fill="#b71c1c" dominant-baseline="central">Unknown</text>
  <text x="547" y="497" text-anchor="middle" font-size="11" fill="#c62828">Skip</text>

  <!-- YES -->
  <line x1="300" y1="514" x2="300" y2="538" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="313" y="528" font-size="11" fill="#388e3c">Yes</text>

  <!-- STEP 4 -->
  <rect x="155" y="540" width="290" height="58" rx="10" fill="#bbdefb" stroke="#1565c0" stroke-width="1.2"/>
  <text x="300" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1" dominant-baseline="central">Mark attendance in DB</text>
  <text x="300" y="582" text-anchor="middle" font-size="11" fill="#1565c0">Date · time · status · confidence</text>

  <line x1="300" y1="598" x2="300" y2="622" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- END -->
  <rect x="175" y="624" width="250" height="42" rx="21" fill="#cfd8dc" stroke="#546e7a" stroke-width="1.2"/>
  <text x="300" y="645" text-anchor="middle" font-size="13" font-weight="600" fill="#263238" dominant-baseline="central">Dashboard updated ✓</text>
</svg>
