<svg width="900" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a237e">IntelliCloud — System Architecture</text>

  <!-- CLIENT LAYER -->
  <rect x="40" y="55" width="820" height="100" rx="14" fill="#e0f7fa" stroke="#00838f" stroke-width="1.2"/>
  <text x="450" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#006064">Client Layer</text>

  <rect x="70" y="88" width="200" height="52" rx="8" fill="#b2ebf2" stroke="#00838f" stroke-width="0.8"/>
  <text x="170" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#004d40">Web browser</text>
  <text x="170" y="126" text-anchor="middle" font-size="11" fill="#00695c">Register / dashboard</text>

  <rect x="340" y="88" width="220" height="52" rx="8" fill="#b2ebf2" stroke="#00838f" stroke-width="0.8"/>
  <text x="450" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#004d40">Webcam device</text>
  <text x="450" y="126" text-anchor="middle" font-size="11" fill="#00695c">Live face capture</text>

  <rect x="630" y="88" width="200" height="52" rx="8" fill="#b2ebf2" stroke="#00838f" stroke-width="0.8"/>
  <text x="730" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#004d40">Standalone client</text>
  <text x="730" y="126" text-anchor="middle" font-size="11" fill="#00695c">client/client.py</text>

  <!-- Arrow down to server -->
  <line x1="450" y1="155" x2="450" y2="182" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="465" y="172" font-size="11" fill="#666">HTTP / REST API</text>

  <!-- SERVER LAYER -->
  <rect x="40" y="185" width="820" height="100" rx="14" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.2"/>
  <text x="450" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#4527a0">Flask Server (app.py)</text>

  <rect x="70" y="218" width="200" height="52" rx="8" fill="#d1c4e9" stroke="#5e35b1" stroke-width="0.8"/>
  <text x="170" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#311b92">REST API routes</text>
  <text x="170" y="256" text-anchor="middle" font-size="11" fill="#4527a0">server/routes.py</text>

  <rect x="340" y="218" width="220" height="52" rx="8" fill="#d1c4e9" stroke="#5e35b1" stroke-width="0.8"/>
  <text x="450" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#311b92">Student service</text>
  <text x="450" y="256" text-anchor="middle" font-size="11" fill="#4527a0">Register / manage</text>

  <rect x="630" y="218" width="200" height="52" rx="8" fill="#d1c4e9" stroke="#5e35b1" stroke-width="0.8"/>
  <text x="730" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#311b92">Attendance service</text>
  <text x="730" y="256" text-anchor="middle" font-size="11" fill="#4527a0">Mark / export CSV</text>

  <!-- Arrows down -->
  <line x1="280" y1="285" x2="280" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="680" y1="285" x2="680" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RECOGNITION ENGINE -->
  <rect x="40" y="318" width="460" height="110" rx="14" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2"/>
  <text x="270" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">Face Recognition Engine</text>
  <rect x="60" y="352" width="120" height="58" rx="8" fill="#ffe082" stroke="#f9a825" stroke-width="0.8"/>
  <text x="120" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">Haar cascade</text>
  <text x="120" y="390" text-anchor="middle" font-size="11" fill="#e65100">Face detection</text>
  <rect x="200" y="352" width="120" height="58" rx="8" fill="#ffe082" stroke="#f9a825" stroke-width="0.8"/>
  <text x="260" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">LBPH</text>
  <text x="260" y="390" text-anchor="middle" font-size="11" fill="#e65100">Recognition</text>
  <rect x="340" y="352" width="140" height="58" rx="8" fill="#ffe082" stroke="#f9a825" stroke-width="0.8"/>
  <text x="410" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">FaceNet + SVM</text>
  <text x="410" y="390" text-anchor="middle" font-size="11" fill="#e65100">Deep features</text>

  <!-- DATABASE -->
  <rect x="520" y="318" width="340" height="110" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="690" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1">Database (SQLite)</text>
  <rect x="540" y="352" width="140" height="58" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="0.8"/>
  <text x="610" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">Students</text>
  <text x="610" y="390" text-anchor="middle" font-size="11" fill="#1565c0">Roll, name, dept</text>
  <rect x="700" y="352" width="140" height="58" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="0.8"/>
  <text x="770" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">Attendance</text>
  <text x="770" y="390" text-anchor="middle" font-size="11" fill="#1565c0">Date, time, status</text>

  <!-- TRAINING IMAGE STORE -->
  <rect x="40" y="452" width="820" height="68" rx="14" fill="#fce4ec" stroke="#c2185b" stroke-width="1.2"/>
  <text x="450" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#880e4f">Training Image Store</text>
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#ad1457">TrainingImage/  (face crops per student)   ·   TrainingImageLabel/  (LBPH .yml + SVM .pkl)</text>

  <!-- Recognition to training store -->
  <line x1="270" y1="428" x2="270" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="486" x2="502" y2="486" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="528" y="480" text-anchor="middle" font-size="10" fill="#666">load model</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
